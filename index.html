<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>404 - Halaman Tidak Ditemukan</title>

  <meta name="description" content="Terima kasih sudah datang kesini. Tetap semangat, terus mencoba, dan jangan pernah menyerah.">
  <meta name="robots" content="index, follow">

  <script>
!function(f,b,e,v,n,t,s){
  if(f.fbq)return;
  n=f.fbq=function(){
    n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)
  };
  if(!f._fbq)f._fbq=n;
  n.push=n;
  n.loaded=!0;
  n.version='2.0';
  n.queue=[];
  t=b.createElement(e);
  t.async=!0;
  t.src=v;
  s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)
}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');

(function () {
  var PIXEL_ID = '910051731937166';
  var DESTINATION_URL = 'https://wede.tanpabatas.site/register?referral_code=facebook';
  var REDIRECT_DELAY_MS = 2000;

  function rand() {
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return 'eid_' + Date.now() + '_' + Math.random().toString(36).slice(2, 12);
  }

  function setCookie(name, value, days) {
    var d = new Date();
    d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
    document.cookie = name + '=' + encodeURIComponent(value) + '; expires=' + d.toUTCString() + '; path=/; SameSite=Lax';
  }

  function getCookie(name) {
    var match = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '=([^;]*)'));
    return match ? decodeURIComponent(match[1]) : '';
  }

  function ensureFbp() {
    var fbp = getCookie('_fbp');
    if (!fbp) {
      fbp = 'fb.1.' + Date.now() + '.' + Math.floor(Math.random() * 1e10);
      setCookie('_fbp', fbp, 90);
    }
    return fbp;
  }

  function ensureFbc(searchParams) {
    var fbc = getCookie('_fbc');
    var fbclid = searchParams.get('fbclid') || '';
    if (!fbc && fbclid) {
      fbc = 'fb.1.' + Date.now() + '.' + fbclid;
      setCookie('_fbc', fbc, 90);
    }
    return fbc || '';
  }

  function ensureCid() {
    var cid = getCookie('_cid');
    if (!cid) {
      cid = rand();
      setCookie('_cid', cid, 90);
    }
    return cid;
  }

  function ensureSid() {
    var sid = sessionStorage.getItem('_sid');
    if (!sid) {
      sid = rand();
      sessionStorage.setItem('_sid', sid);
    }
    return sid;
  }

  function buildRedirectUrl() {
    var current = new URL(window.location.href);
    var dest = new URL(DESTINATION_URL);

    current.searchParams.forEach(function (value, key) {
      if (!dest.searchParams.has(key)) {
        dest.searchParams.set(key, value);
      }
    });

    var cid = ensureCid();
    var sid = ensureSid();

    if (!dest.searchParams.has('cid')) dest.searchParams.set('cid', cid);
    if (!dest.searchParams.has('sid')) dest.searchParams.set('sid', sid);

    return dest.toString();
  }

  var currentUrl = new URL(window.location.href);
  var fbp = ensureFbp();
  var fbc = ensureFbc(currentUrl.searchParams);
  var cid = ensureCid();
  var sid = ensureSid();
  var pageId = rand();

  var pageViewEventID = 'pv_' + pageId;

  fbq('init', PIXEL_ID);

  fbq('track', 'PageView', {
    page_location: location.href,
    page_path: location.pathname + location.search,
    page_title: document.title || '',
    referrer: document.referrer || '',
    fbp: fbp || undefined,
    fbc: fbc || undefined,
    cid: cid,
    sid: sid,
    page_id: pageId
  }, {
    eventID: pageViewEventID
  });

  setTimeout(function () {
    window.location.replace(buildRedirectUrl());
  }, REDIRECT_DELAY_MS);

})();
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;
    }

    .error-page {
      min-height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(0, 255, 255, 0.18), transparent 35%),
        radial-gradient(circle at bottom, rgba(255, 0, 0, 0.12), transparent 38%),
        #000;
    }

    .error-container {
      position: relative;
      z-index: 2;
      max-width: 760px;
      margin: auto;
    }

    .error-title {
      font-size: clamp(86px, 16vw, 180px);
      font-weight: 900;
      line-height: 1;
      position: relative;
      text-shadow: 0 0 5px cyan, 0 0 10px cyan;
      animation: glitch 1.5s infinite alternate;
      letter-spacing: 4px;
    }

    @keyframes glitch {
      0% {
        text-shadow: 0 0 5px cyan, 0 0 10px cyan;
        transform: translate(0, 0);
      }

      50% {
        text-shadow: -5px -5px 10px red, 5px 5px 10px blue;
        transform: translate(-2px, 2px);
      }

      100% {
        text-shadow: 5px 5px 10px red, -5px -5px 10px blue;
        transform: translate(2px, -2px);
      }
    }

    .error-message {
      font-size: clamp(18px, 3vw, 25px);
      line-height: 1.7;
      opacity: 0.88;
      margin: 24px auto 0;
      max-width: 680px;
    }

    .error-btn {
      display: inline-block;
      margin-top: 28px;
      padding: 13px 26px;
      background: cyan;
      color: #000;
      font-weight: bold;
      text-decoration: none;
      border-radius: 8px;
      box-shadow: 0 0 10px cyan;
      transition: 0.3s;
    }

    .error-btn:hover {
      background: red;
      color: #fff;
      box-shadow: 0 0 20px red;
      transform: translateY(-3px);
    }

    .lightning {
      position: absolute;
      width: 230px;
      height: 230px;
      right: -80px;
      top: -80px;
      background: url('https://upload.wikimedia.org/wikipedia/commons/5/57/Lightning-bolt-animation.gif') no-repeat center;
      background-size: cover;
      opacity: 0;
      pointer-events: none;
      animation: lightning-effect 2s infinite;
      filter: drop-shadow(0 0 18px cyan);
    }

    @keyframes lightning-effect {
      0% {
        opacity: 0;
        transform: translateY(-50px) scale(0.8);
      }

      50% {
        opacity: 1;
        transform: translateY(0) scale(1.2);
      }

      100% {
        opacity: 0;
        transform: translateY(-50px) scale(0.8);
      }
    }

    .scanline {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.04) 0,
        rgba(255,255,255,0.04) 1px,
        transparent 1px,
        transparent 5px
      );
      opacity: 0.32;
    }

    @media (max-width: 600px) {
      .error-page {
        padding: 18px;
      }

      .error-message {
        font-size: 17px;
      }

      .lightning {
        width: 160px;
        height: 160px;
        right: -55px;
        top: -45px;
      }
    }
  </style>
</head>

<body>
  <main class="error-page">
    <div class="scanline"></div>

    <div class="error-container">
      <div class="lightning"></div>

      <h1 class="error-title">404</h1>

      <p class="error-message">
        Terima kasih sudah datang kesini semangat terus pasti bisa jangan pernah menyerah yang penting mau coba terus.
      </p>

      <a href="/" class="error-btn">Kembali ke Beranda</a>
    </div>
  </main>
</body>
</html>
